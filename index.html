<!DOCTYPE html>
<html>
    <head>
        <title>Melanie Nguyen</title>
        <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    </head>

    <style>

        body {
            background-image: url("/assets/backgroundPic.jpg");
            background-repeat: repeat-y;
            background-repeat: repeat-x;
        }
        
        #bio {
            display: grid;
            grid-template-columns: 120px 1fr;
            align-items: center;
            gap: 15px; 
            margin: 80px;
            border: 2px dashed 5px pink;
            background-color: white;
        }
        
        #bio h1 {
            font-family: "Monaco";
            font-size: 35px;
            text-align: center;
        }
        
        #bio p {
            font-family: "Garamond";
            font-size: 15px;
            text-align: center;
        }

        #bio img {
            width: 500px;
            height: auto;
        }
        
    </style>
    
    <body>
        <section id="bio">
            <img src="/assets/kwakfjsd.png">
            <div>
                <h1>Melanie Nguyen</h1>
                <p>A highschool senior interested in cybersecurity and visual arts.</p>
            </div>
        </section>
    </body>
    
</html>
